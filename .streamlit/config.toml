[theme]
# Base oscura; en modo claro el panel fuerza texto/inputs vía _theme_panel.css.
primaryColor = "#FF007F"
backgroundColor = "#3c3c48"
secondaryBackgroundColor = "#484854"
textColor = "#FFFFFF"
font = "sans serif"

[server]
headless = true
# Escucha en todas las interfaces (LAN). Sin esto solo funciona http://127.0.0.1:8501
address = "0.0.0.0"
port = 8501
# Acceso desde otros dispositivos (http://<IP-de-este-PC>:8501).
enableCORS = false
enableXsrfProtection = false
