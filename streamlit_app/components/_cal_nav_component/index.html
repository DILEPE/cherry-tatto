<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script>
(function () {
  "use strict";

  /* ── Protocolo mínimo Streamlit Component ── */
  function postUp(type, extra) {
    var msg = { isStreamlitMessage: true, type: type };
    if (extra) Object.keys(extra).forEach(function (k) { msg[k] = extra[k]; });
    window.parent.postMessage(msg, "*");
  }
  function setComponentValue(val) { postUp("streamlit:setComponentValue", { value: val }); }
  function setFrameHeight(h)      { postUp("streamlit:setFrameHeight",    { height: h }); }
  function sendReady()             { postUp("streamlit:componentReady",    { apiVersion: 1 }); }

  /* ── Lógica del puente inyectado en el documento padre ──
     Captura clics en .cal-query-nav y hace broadcast a todos los iframes
     usando postMessage en lugar de window.location.assign (que reinicia sesión).
  */
  var BRIDGE_NS = "__cherryCalNavV5";
  var BRIDGE_SRC = (function () {
    var ns = JSON.stringify(BRIDGE_NS);
    return [
      "(function(){",
      "  var NS=" + ns + ";",
      "  function appWin(){try{return window.top;}catch(e){return window;}}",
      "  function broadcast(msg){",
      "    var w=appWin();",
      "    try{",
      "      var frames=w.document.querySelectorAll('iframe');",
      "      for(var i=0;i<frames.length;i++){",
      "        try{frames[i].contentWindow.postMessage(msg,'*');}catch(e){}",
      "      }",
      "    }catch(e){}",
      "  }",
      "  function onClick(ev){",
      "    var t=ev.target;",
      "    if(!t||typeof t.closest!=='function')return;",
      "    var el=t.closest('.cal-query-nav,[data-cal-nav]');",
      "    if(!el||el.disabled||el.getAttribute('aria-disabled')==='true')return;",
      "    ev.preventDefault();ev.stopPropagation();",
      "    var nav=el.getAttribute('data-cal-nav');",
      "    if(nav==='appt'){",
      "      var id=parseInt(el.getAttribute('data-cal-appt-id')||'',10);",
      "      if(id>0)broadcast({type:'cherryCalAppt',id:id});",
      "    }else if(nav==='book'){",
      "      var y=parseInt(el.getAttribute('data-cal-y')||'',10);",
      "      var m=parseInt(el.getAttribute('data-cal-m')||'',10);",
      "      var d=parseInt(el.getAttribute('data-cal-d')||'',10);",
      "      if(d>0)broadcast({type:'cherryCalBook',y:y,m:m,d:d});",
      "    }",
      "  }",
      "  function bindDoc(doc){",
      "    if(!doc||!doc.body)return;",
      "    var bk=NS+'_bound';",
      "    if(doc.documentElement.getAttribute(bk))return;",
      "    doc.documentElement.setAttribute(bk,'1');",
      "    doc.addEventListener('click',onClick,true);",
      "  }",
      "  function scan(){",
      "    var w=appWin();",
      "    try{bindDoc(w.document);}catch(e){}",
      "  }",
      "  scan();",
      "  setTimeout(scan,0);setTimeout(scan,300);setTimeout(scan,900);setTimeout(scan,2000);",
      "  try{",
      "    var obs=new MutationObserver(scan);",
      "    obs.observe(appWin().document.body,{childList:true,subtree:true});",
      "  }catch(e){}",
      "})();"
    ].join("");
  }());

  /* ── Inyectar puente en el documento padre ── */
  function appDocument() {
    try {
      var t = window.top;
      if (t && t.document && t.document.querySelector("[data-testid='stApp']")) return t.document;
    } catch (e) {}
    var x = window;
    for (var i = 0; i < 12; i++) {
      try {
        if (!x || !x.document) break;
        if (x.document.querySelector("[data-testid='stApp']")) return x.document;
        if (x.parent === x) break;
        x = x.parent;
      } catch (e) { break; }
    }
    try { return window.top.document; } catch (e) { return document; }
  }

  var _bridgeInjected = false;
  function injectBridge() {
    if (_bridgeInjected) return;
    var doc = appDocument();
    var injKey = BRIDGE_NS + "_injected";
    if (doc.documentElement.getAttribute(injKey)) { _bridgeInjected = true; return; }
    doc.documentElement.setAttribute(injKey, "1");
    try {
      var s = doc.createElement("script");
      s.textContent = BRIDGE_SRC;
      (doc.head || doc.documentElement).appendChild(s);
      s.remove();
      _bridgeInjected = true;
    } catch (e) {}
  }

  /* ── Escuchar mensajes del puente ── */
  /* Cada acción lleva un _nonce único; Python lo guarda en _cal_nav_consumed_nonce
     y omite acciones ya procesadas aunque Streamlit restaure el widget state. */
  function makeNonce() {
    return String(Date.now()) + "_" + String(Math.floor(Math.random() * 1e9));
  }

  window.addEventListener("message", function (e) {
    if (!e.data || typeof e.data !== "object") return;
    if (e.data.type === "cherryCalAppt" && e.data.id > 0) {
      setComponentValue({ type: "appt", id: e.data.id, _nonce: makeNonce() });
    } else if (e.data.type === "cherryCalBook" && e.data.y > 0 && e.data.d > 0) {
      setComponentValue({ type: "book", y: e.data.y, m: e.data.m, d: e.data.d, _nonce: makeNonce() });
    }
  });

  /* ── Render: Streamlit envía este mensaje cuando el componente debe pintarse ── */
  window.addEventListener("message", function (e) {
    if (!e.data || e.data.type !== "streamlit:render") return;
    setFrameHeight(0);
    injectBridge();
  });

  /* ── Arranque ── */
  sendReady();
  setFrameHeight(0);

  /* Inyectar inmediatamente también (por si el render llega antes del listener) */
  setTimeout(function () {
    setFrameHeight(0);
    injectBridge();
  }, 0);
  setTimeout(injectBridge, 400);
}());
</script>
</head>
<body></body>
</html>
